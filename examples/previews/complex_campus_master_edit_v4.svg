  <text x="72" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Complex Campus</text>
  <text x="72" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#0f172a">Management VLAN, Telnet, ACL, DNS, email, AAA, and multi-SSID wireless campus edit.</text>
  <text x="72" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f766e">Capabilities</text>
  <text x="72" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Core router: Router0</text><text x="72" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Managed switches: 6</text><text x="72" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Wireless routers: 5</text><text x="72" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a"></text>
  <text x="72" y="430" font-family="Consolas, monospace" font-size="24" fill="#0f172a">management_vlan, telnet, acl</text><text x="72" y="470" font-family="Consolas, monospace" font-size="24" fill="#0f172a">server_dns, server_email, server_aaa</text><text x="72" y="510" font-family="Consolas, monospace" font-size="24" fill="#0f172a">wireless_mutation</text>
  <rect x="1020" y="170" width="458" height="560" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
  <text x="1055" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f766e">Artifact Policy</text>
  <text x="1055" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- raw .pkt binary is not committed</text>
  <text x="1055" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- inventory manifest is committed</text>
  <text x="1055" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- preview is generated from manifest</text>
  <text x="1055" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f766e">Scenario family</text>
  <text x="1055" y="515" font-family="Consolas, monospace" font-size="30" fill="#0f172a">campus</text>
  <text x="1055" y="605" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f766e">Verification</text>
  <text x="1055" y="650" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">inventory roundtrip verified</text>
  <text x="1055" y="695" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">full pytest passed</text>
