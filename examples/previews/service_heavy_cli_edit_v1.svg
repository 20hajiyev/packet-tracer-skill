<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="42" y="42" width="1516" height="816" rx="28" fill="#f5f3ff" stroke="#7c3aed" stroke-width="8"/>
  <rect x="42" y="42" width="1516" height="120" rx="28" fill="#7c3aed"/>
  <text x="72" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Service Heavy</text>
  <text x="72" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#0f172a">Service-rich server lab with DNS, DHCP, FTP, email, syslog, AAA, and detailed service metadata.</text>
  <text x="72" y="388" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#7c3aed">Capabilities</text>
  <text x="72" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Core server: Server0</text><text x="72" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Services: 10</text><text x="72" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">Email domain: example.local</text><text x="72" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#0f172a">AAA port: 1812</text>
  <text x="72" y="430" font-family="Consolas, monospace" font-size="24" fill="#0f172a">server_dns, server_dhcp, server_ftp</text><text x="72" y="470" font-family="Consolas, monospace" font-size="24" fill="#0f172a">server_email, server_syslog, server_aaa</text>
  <rect x="1020" y="170" width="458" height="560" rx="20" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
  <text x="1055" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#7c3aed">Artifact Policy</text>
  <text x="1055" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- raw .pkt binary is not committed</text>
  <text x="1055" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- inventory manifest is committed</text>
  <text x="1055" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">- preview is generated from manifest</text>
  <text x="1055" y="470" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#7c3aed">Scenario family</text>
  <text x="1055" y="515" font-family="Consolas, monospace" font-size="30" fill="#0f172a">service_heavy</text>
  <text x="1055" y="605" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#7c3aed">Verification</text>
  <text x="1055" y="650" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">inventory roundtrip verified</text>
  <text x="1055" y="695" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">full pytest passed</text>
</svg>
