name: Feature request
description: Request a new scenario family, donor class, capability, host integration, or docs improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: area
    attributes:
      label: Requested area
      description: Example: campus, service-heavy, WAN/security edge, runtime doctor, examples, npm packaging
      placeholder: WAN/security edge
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the real user or engineering problem
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
      description: Describe what success looks like
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or acceptance notes
      description: Include Packet Tracer version, donor expectations, runtime constraints, or refusal expectations if relevant
